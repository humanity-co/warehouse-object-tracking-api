apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "warehouse-platform.name" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "warehouse-platform.name" . }}-redis
  template:
    metadata:
      labels:
        app: {{ include "warehouse-platform.name" . }}-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "warehouse-platform.name" . }}-schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "warehouse-platform.name" . }}-schema-registry
  template:
    metadata:
      labels:
        app: {{ include "warehouse-platform.name" . }}-schema-registry
    spec:
      containers:
        - name: schema-registry
          image: {{ .Values.schemaRegistry.image }}
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: {{ include "warehouse-platform.name" . }}-schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: PLAINTEXT://{{ include "warehouse-platform.name" . }}-kafka:9092
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "warehouse-platform.name" . }}-postgres
spec:
  serviceName: {{ include "warehouse-platform.name" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "warehouse-platform.name" . }}-postgres
  template:
    metadata:
      labels:
        app: {{ include "warehouse-platform.name" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: warehouse
            - name: POSTGRES_USER
              value: warehouse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "warehouse-platform.name" . }}-secrets
                  key: postgres-password
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "warehouse-platform.name" . }}-kafka
spec:
  serviceName: {{ include "warehouse-platform.name" . }}-kafka
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "warehouse-platform.name" . }}-kafka
  template:
    metadata:
      labels:
        app: {{ include "warehouse-platform.name" . }}-kafka
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
            - name: KAFKA_CFG_NODE_ID
              value: "0"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: controller,broker
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: 0@{{ include "warehouse-platform.name" . }}-kafka:9093
            - name: KAFKA_CFG_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: PLAINTEXT://{{ include "warehouse-platform.name" . }}-kafka:9092
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"

