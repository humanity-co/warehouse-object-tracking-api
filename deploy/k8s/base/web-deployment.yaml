apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-web
  template:
    metadata:
      labels:
        app: warehouse-web
    spec:
      containers:
        - name: web
          image: warehouse/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://warehouse-api:8000
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-web
spec:
  selector:
    app: warehouse-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000

