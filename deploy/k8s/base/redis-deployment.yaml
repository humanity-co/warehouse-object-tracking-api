apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warehouse-redis
  template:
    metadata:
      labels:
        app: warehouse-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: warehouse-redis
spec:
  selector:
    app: warehouse-redis
  ports:
    - port: 6379
      targetPort: 6379

